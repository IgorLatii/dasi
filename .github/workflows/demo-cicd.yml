name: dasi-demo-ci-cd

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/igorlatii/dasi

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw test

      - name: Build jar
        run: ./mvnw clean package -DskipTests

  build-and-push:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build image
        run: |
          docker build -f Dockerfile.demo \
            -t $IMAGE_NAME:latest \
            -t $IMAGE_NAME:${GITHUB_SHA} \
            .

      - name: Push latest
        run: docker push $IMAGE_NAME:latest

      - name: Push sha
        run: docker push $IMAGE_NAME:${GITHUB_SHA}

  deploy-via-idp:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Trigger IDP release
        run: |
          curl -X POST "http://20.251.155.82:8000/releases" \
            -H "accept: application/json" \
            -H "Content-Type: application/json" \
            -d '{
              "service": "frontier-consult",
              "version": "'"${GITHUB_SHA}"'",
              "environment": "dev",
              "target": {
                "repo": "local",
                "ref": "'"${GITHUB_SHA}"'",
                "composePath": "docker-compose.yml"
              }
            }'